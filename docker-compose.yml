services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stronghold
      POSTGRES_USER: stronghold
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stronghold -d stronghold"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - stronghold

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stronghold:${DB_PASSWORD:-change-me-local-only}@postgres:5432/stronghold?schema=public
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: http://localhost:${WEB_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # STRONGHOLD_ENCRYPTION_KEY: "generate with: openssl rand -hex 32"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE:-}
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    networks:
      - stronghold

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    init: true
    depends_on:
      server:
        condition: service_started
    ports:
      - "${WEB_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    networks:
      - stronghold

networks:
  stronghold:

volumes:
  postgres_data:
