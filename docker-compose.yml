version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pra_user
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: pra_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pra_user -d pra_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: pra_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change_me_minio
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: pra_chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat').read(); sys.exit(0)"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: pra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-migrate:
    build:
      context: ./backend
      target: migrate
    image: stronghold-backend-migrate
    container_name: pra_backend_migrate
    restart: "no"
    entrypoint: ["bash", "-lc"]
    command: ["./scripts/migrate-and-seed.sh"]
    environment:
      DATABASE_URL: postgresql://pra_user:change_me@postgres:5432/pra_platform?schema=public
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: change_me_minio
      S3_BUCKET_PREFIX: stronghold-docs
      S3_FORCE_PATH_STYLE: "true"
      REDIS_URL: redis://redis:6379
      CHROMADB_URL: http://chroma:8000
      SEED_ON_START: "true"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: runtime
    image: stronghold-backend
    container_name: pra_backend
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOW_NO_ORIGIN: "true"
      DATABASE_URL: postgresql://pra_user:change_me@postgres:5432/pra_platform?schema=public
      CHROMADB_URL: http://chroma:8000
      CHROMADB_COLLECTION: pra-documents
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: change_me_minio
      S3_BUCKET_PREFIX: stronghold-docs
      S3_FORCE_PATH_STYLE: "true"
      S3_SIGNED_URL_TTL_SECONDS: 900
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      target: runtime
      args:
        VITE_BACKEND_URL: http://localhost:4000
        VITE_API_URL: http://localhost:4000
        VITE_API_KEY: dev-key
    image: stronghold-frontend
    container_name: pra_frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  chroma_data:
