version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pra_user
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: pra_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pra_user -d pra_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: pra_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change_me_minio
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: pra_chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma
    ports:
      - "8000:8000"

  backend:
    image: node:20
    container_name: pra_backend
    working_dir: /app
    command: sh -c "./scripts/docker-start.sh"
    volumes:
      - ./backend:/app
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://pra_user:change_me@postgres:5432/pra_platform?schema=public
      CHROMADB_URL: http://chroma:8000
      CHROMADB_COLLECTION: pra-documents
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: change_me_minio
      S3_BUCKET_PREFIX: stronghold-docs
      S3_FORCE_PATH_STYLE: "true"
      S3_SIGNED_URL_TTL_SECONDS: 900
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      chroma:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: node:20
    container_name: pra_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app
    environment:
      VITE_BACKEND_URL: http://localhost:4000
      VITE_API_URL: http://localhost:4000
      VITE_API_KEY: dev-key
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  chroma_data:
