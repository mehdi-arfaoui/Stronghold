version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pra_user
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: pra_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    container_name: pra_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change_me_minio
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: pra_chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma
    ports:
      - "8000:8000"

  # backend et frontend seront ajoutés plus tard
  # backend:
  # frontend:

volumes:
  postgres_data:
  minio_data:
  chroma_data:
