services:
  postgres:
    image: postgres:16
    container_name: pra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: pra_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: pra_chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "chroma --help >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: pra_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-migrate:
    build:
      context: ./backend
      target: migrate
    image: stronghold-backend-migrate
    container_name: pra_backend_migrate
    restart: "no"
    entrypoint: ["bash", "-lc"]
    command: ["./scripts/migrate-and-seed.sh"]
    environment:
      DOCKER_BUILDKIT: ${DOCKER_BUILDKIT}
      COMPOSE_DOCKER_CLI_BUILD: ${COMPOSE_DOCKER_CLI_BUILD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_PREFIX: ${S3_BUCKET_PREFIX}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      REDIS_URL: ${REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CHROMADB_URL: ${CHROMADB_URL}
      CHROMADB_COLLECTION: ${CHROMADB_COLLECTION}
      CHROMADB_API_TOKEN: ${CHROMADB_API_TOKEN}
      SEED_ON_START: ${SEED_ON_START:-true}
      LOAD_DEMO_SEED: ${LOAD_DEMO_SEED:-false}
      SEED_API_KEY: ${SEED_API_KEY}
      SEED_PLAN: ${SEED_PLAN}
      OWNER_API_KEY: ${OWNER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: runtime
    image: stronghold-backend
    container_name: pra_backend
    environment:
      DOCKER_BUILDKIT: ${DOCKER_BUILDKIT}
      COMPOSE_DOCKER_CLI_BUILD: ${COMPOSE_DOCKER_CLI_BUILD}
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      HOST: ${HOST}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ORIGIN: ${CORS_ORIGIN}
      CORS_ALLOW_NO_ORIGIN: ${CORS_ALLOW_NO_ORIGIN}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      CHROMADB_URL: ${CHROMADB_URL}
      CHROMADB_COLLECTION: ${CHROMADB_COLLECTION}
      CHROMADB_API_TOKEN: ${CHROMADB_API_TOKEN}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_PREFIX: ${S3_BUCKET_PREFIX}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_SIGNED_URL_TTL_SECONDS: ${S3_SIGNED_URL_TTL_SECONDS}
      REDIS_URL: ${REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      LICENSE_SIGNING_SECRET: ${LICENSE_SIGNING_SECRET}
      DISCOVERY_SECRET: ${DISCOVERY_SECRET}
      OWNER_EMAIL: ${OWNER_EMAIL}
      OWNER_API_KEY: ${OWNER_API_KEY:-}
      OWNER_PASSWORD: ${OWNER_PASSWORD}
      ALLOW_DEMO_SEED: ${ALLOW_DEMO_SEED}
      AWS_PRICING_REGION: ${AWS_PRICING_REGION:-us-east-1}
      AWS_PRICING_ACCESS_KEY_ID: ${AWS_PRICING_ACCESS_KEY_ID}
      AWS_PRICING_SECRET_ACCESS_KEY: ${AWS_PRICING_SECRET_ACCESS_KEY}
      GCP_PRICING_API_KEY: ${GCP_PRICING_API_KEY}
      USD_EUR_RATE: ${USD_EUR_RATE:-0.92}
    ports:
      - "4000:4000"
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_API_KEY: ${VITE_API_KEY}
        VITE_APP_VERSION: ${VITE_APP_VERSION}
        VITE_ENV: ${VITE_ENV}
    image: stronghold-frontend
    container_name: pra_frontend
    environment:
      DOCKER_BUILDKIT: ${DOCKER_BUILDKIT}
      COMPOSE_DOCKER_CLI_BUILD: ${COMPOSE_DOCKER_CLI_BUILD}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  chroma_data:
