name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Lint all
        run: npm run lint
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/prisma/schema.prisma
      - run: npm run typecheck

  test-core:
    name: Test Core
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage --workspace=packages/core

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [test-core]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  docker:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: cp .env.example .env
      - name: Make smoke script executable
        run: chmod +x scripts/smoke-test.sh
      - name: Build and smoke test Docker Compose baseline
        run: ./scripts/smoke-test.sh
