# .github/workflows/docker-publish.yml
#
# Build et push les images Docker sur ghcr.io quand un tag est pousse.
#
# Usage :
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Images produites :
#   ghcr.io/mehdux69/stronghold-api:1.0.0      (client build)
#   ghcr.io/mehdux69/stronghold-api:latest
#   ghcr.io/mehdux69/stronghold-web:1.0.0       (client build)
#   ghcr.io/mehdux69/stronghold-web:latest
#   ghcr.io/mehdux69/stronghold-api-internal:1.0.0   (internal build, demo inclus)
#   ghcr.io/mehdux69/stronghold-api-internal:latest
#   ghcr.io/mehdux69/stronghold-web-internal:1.0.0
#   ghcr.io/mehdux69/stronghold-web-internal:latest

name: Build & Publish Docker Images

on:
  push:
    tags:
      - 'v*'  # Declenche sur v1.0.0, v1.2.3-beta, etc.

  # Permet de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  OWNER: mehdux69

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          # Backend client (livre aux entreprises)
          - context: ./backend
            image_name: stronghold-api
            target: client
            build_target_env: client

          # Backend internal (demo inclus, pour toi)
          - context: ./backend
            image_name: stronghold-api-internal
            target: internal
            build_target_env: internal

          # Frontend client
          - context: ./frontend
            image_name: stronghold-web
            target: client
            build_target_env: client

          # Frontend internal
          - context: ./frontend
            image_name: stronghold-web-internal
            target: internal
            build_target_env: internal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Enlever le prefixe 'v' pour le tag d'image (v1.0.0 -> 1.0.0)
          VERSION_NUM="${VERSION#v}"
          echo "version=$VERSION_NUM" >> "$GITHUB_OUTPUT"
          echo "full_tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION_NUM"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TARGET=${{ matrix.build_target_env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job separé pour verifier que les images sont accessibles
  verify:
    needs: build-and-push
    runs-on: ubuntu-latest

    permissions:
      packages: read

    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images exist
        run: |
          echo "Verifying images..."
          docker pull ghcr.io/mehdux69/stronghold-api:latest
          docker pull ghcr.io/mehdux69/stronghold-web:latest
          echo "All images verified."